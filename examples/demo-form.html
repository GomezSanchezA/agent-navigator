<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo formulario patrimonial</title>
    <style>
      body {
        margin: 0;
        font: 16px/1.4 "Segoe UI", sans-serif;
        background: #f6f5ef;
        color: #2f2a23;
      }

      main {
        max-width: 760px;
        margin: 40px auto;
        background: #fffdf7;
        border: 1px solid #d9d2c3;
        border-radius: 20px;
        padding: 24px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
      }

      input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #c7bfb1;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
      }

      .primary {
        background: #0f766e;
        color: white;
      }

      .secondary {
        background: #1d4ed8;
        color: white;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ganancias patrimoniales</h1>
      <p>Formulario de prueba para validar la extension sin tocar la web real.</p>
      <div class="actions">
        <button class="secondary" type="button">Alta elemento patrimonial</button>
      </div>
      <form class="grid">
        <label>
          <span>Descripcion</span>
          <input type="text" name="descripcion">
        </label>
        <label>
          <span>Fecha de adquisicion</span>
          <input type="text" name="fecha_adquisicion">
        </label>
        <label>
          <span>Fecha de transmision</span>
          <input type="text" name="fecha_transmision">
        </label>
        <label>
          <span>Valor de adquisicion</span>
          <input type="text" name="valor_adquisicion">
        </label>
        <label>
          <span>Valor de transmision</span>
          <input type="text" name="valor_transmision">
        </label>
        <label>
          <span>Gastos</span>
          <input type="text" name="gastos">
        </label>
        <div class="actions">
          <button class="primary" type="button" onclick="alert('Guardado demo')">Guardar</button>
        </div>
      </form>
    </main>
  </body>
</html>
