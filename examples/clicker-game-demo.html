<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Clicker Arena</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #09111f;
        --panel: rgba(10, 24, 45, 0.88);
        --line: rgba(134, 239, 172, 0.18);
        --text: #f8fafc;
        --muted: #93c5fd;
        --accent: #22c55e;
        --accent-2: #38bdf8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.4 "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 30%),
          radial-gradient(circle at bottom, rgba(34, 197, 94, 0.18), transparent 32%),
          var(--bg);
      }

      .game {
        width: min(92vw, 520px);
        padding: 28px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
      }

      p {
        color: var(--muted);
      }

      .score {
        font-size: 48px;
        font-weight: 800;
        margin: 16px 0;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        font: inherit;
        cursor: pointer;
      }

      .start {
        background: var(--accent-2);
        color: #06253b;
        font-weight: 700;
      }

      .coin {
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="game">
      <h1>Mini Clicker Arena</h1>
      <p>Use this toy page to prove the browser agent can play a simple game loop.</p>
      <div class="score" id="score">0</div>
      <div class="actions">
        <button class="start" type="button" onclick="document.getElementById('status').textContent='Game started'">Start game</button>
        <button class="coin" type="button" onclick="score.textContent = String(Number(score.textContent) + 1)">Collect coin</button>
      </div>
      <p id="status">Ready</p>
    </main>
    <script>
      const score = document.getElementById("score");
    </script>
  </body>
</html>
